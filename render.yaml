services:
  - type: web
    name: sentinel-core
    env: python
    buildCommand: pip install -r requirements.txt && python -c "from TTS.api import TTS; TTS(model_name='tts_models/en/ljspeech/tacotron2-DDC')"
    startCommand: gunicorn app:app --timeout 120
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: COQUI_TOS_AGREED
        value: "1"
