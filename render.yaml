services:
  - type: web
    name: sentinel-core
    env: python
    buildCommand: pip install -r requirements.txt && python -c "import os; os.environ['COQUI_TOS_AGREED']='1'; from TTS.api import TTS; TTS(model_name='tts_models/multilingual/multi-dataset/xtts_v2')"
    startCommand: gunicorn app:app --timeout 300 --workers 1
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: COQUI_TOS_AGREED
        value: "1"
