<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VOYCE // Digital Twin</title>
<style>
  :root {
    --bg-0: #04070f;
    --bg-1: #0a1426;
    --hud: #5fe8ff;
    --hud-dim: rgba(95, 232, 255, 0.4);
    --user: #ff9f6b;
    --text: #e8f6ff;
    --muted: #7a96b3;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    background: var(--bg-0);
    color: var(--text);
    font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    overflow: hidden;
  }
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(95,232,255,0.18), transparent 60%),
      radial-gradient(ellipse at 50% 90%, rgba(255,159,107,0.06), transparent 55%),
      linear-gradient(180deg, #04070f 0%, #0a1426 100%);
    transition: background 1.2s ease;
  }
  .bg.tactical {
    background:
      radial-gradient(ellipse at 50% 50%, rgba(95,232,255,0.28), transparent 60%),
      linear-gradient(180deg, #03101c 0%, #04223a 100%);
  }
  .grid {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image:
      linear-gradient(rgba(95,232,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(95,232,255,0.05) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 78%);
  }
  .hud {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    height: 100vh; width: 100vw;
    padding: 20px;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    border: 1px solid var(--hud-dim);
    background: rgba(10, 20, 38, 0.5);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--hud);
  }
  .brand { font-weight: 700; }
  .state-pill {
    color: var(--text);
    padding: 4px 14px;
    border: 1px solid var(--hud-dim);
    border-radius: 999px;
    font-size: 10px;
  }
  .dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #2a3f5a;
    margin-right: 10px; vertical-align: middle;
    transition: all 200ms ease;
  }
  .dot.user { background: var(--user); box-shadow: 0 0 12px var(--user); }
  .dot.twin { background: var(--hud); box-shadow: 0 0 12px var(--hud); }
  .dot.warn { background: #ffd166; box-shadow: 0 0 12px #ffd166; }
  .stage {
    flex: 1;
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 20px 0;
  }
  .avatar-wrap {
    position: relative;
    width: min(440px, 50vh);
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
  }
  .ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(95,232,255,0.25);
  }
  .ring.r2 { inset: -28px; border-color: rgba(95,232,255,0.15); }
  .ring.r3 { inset: -60px; border-color: rgba(95,232,255,0.08); }
  .ring.pulse { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50%       { transform: scale(1.05); opacity: 1; }
  }
  .breathe { animation: breathe 5s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }
  .avatar {
    position: relative;
    width: 86%; height: 86%;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--hud);
    box-shadow: 0 0 50px rgba(95,232,255,0.5), inset 0 0 50px rgba(95,232,255,0.18);
    background: #051322;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* Eyes */
  .eyes {
    position: absolute; left: 0; right: 0;
    top: 33%; height: 12%;
    display: flex; align-items: center; justify-content: center;
    gap: 18%; pointer-events: none; z-index: 3;
  }
  .eye {
    width: 18%; aspect-ratio: 1/1;
    border-radius: 50%;
    background: #051322;
    border: 2px solid rgba(95,232,255,0.7);
    box-shadow: 0 0 10px rgba(95,232,255,0.4), inset 0 0 8px rgba(95,232,255,0.15);
    position: relative;
    overflow: hidden;
    transition: transform 120ms ease;
  }
  .eye.closed { transform: scaleY(0.08); }
  .pupil {
    position: absolute;
    width: 52%; height: 52%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #5fe8ff, #0a3a5c);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: transform 80ms ease;
  }
  .pupil-dot {
    position: absolute;
    width: 30%; height: 30%;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    top: 18%; left: 18%;
  }
  .mouth {
    position: absolute;
    left: 50%; top: 70%;
    transform: translate(-50%, -50%);
    width: 22%; height: 4%;
    background: #1a0a14;
    border-radius: 50%;
    box-shadow: inset 0 -4px 10px rgba(0,0,0,0.7), 0 0 18px rgba(95,232,255,0.5);
    transition: height 60ms linear, width 60ms linear;
    pointer-events: none;
  }
  .caption {
    margin-top: 28px;
    text-align: center;
    max-width: 720px;
    padding: 0 20px;
    min-height: 64px;
  }
  .caption .who {
    display: block;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--hud);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .caption.user .who { color: var(--user); }
  .caption .text { font-size: 18px; line-height: 1.5; color: var(--text); }
  .footer {
    display: flex; align-items: center; justify-content: center;
    gap: 28px;
    padding: 18px 24px;
    border: 1px solid var(--hud-dim);
    background: rgba(10, 20, 38, 0.55);
    border-radius: 14px;
    backdrop-filter: blur(10px);
  }
  .mic-card {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    min-width: 72px;
  }
  .mic-ico {
    width: 52px; height: 52px; border-radius: 50%;
    border: 2px solid #2a3f5a;
    display: flex; align-items: center; justify-content: center;
    background: rgba(95,232,255,0.04);
    transition: all 200ms ease;
  }
  .mic-ico svg { width: 22px; height: 22px; color: #6a87a3; transition: color 200ms ease; }
  .mic-ico.user-on { border-color: var(--user); box-shadow: 0 0 18px rgba(255,159,107,0.6); }
  .mic-ico.user-on svg { color: var(--user); }
  .mic-ico.twin-on { border-color: var(--hud); box-shadow: 0 0 18px rgba(95,232,255,0.6); }
  .mic-ico.twin-on svg { color: var(--hud); }
  .mic-lbl { font-size: 9px; letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase; }
  .level { width: 56px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .level .fill { height: 100%; width: 0%; transition: width 80ms linear; }
  .level.user .fill { background: var(--user); }
  .level.twin .fill { background: var(--hud); }
  .primary-btn {
    background: transparent;
    border: 2px solid var(--hud);
    color: var(--hud);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 16px 36px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 200ms ease;
    box-shadow: 0 0 22px rgba(95,232,255,0.35);
    font-weight: 700;
    white-space: nowrap;
  }
  .primary-btn:hover { background: rgba(95,232,255,0.12); transform: translateY(-1px); }
  .primary-btn.stop { border-color: var(--user); color: var(--user); box-shadow: 0 0 22px rgba(255,159,107,0.35); }
  @media (max-width: 600px) {
    .topbar { font-size: 9px; padding: 10px 12px; }
    .topbar > div:last-child { display: none; }
    .caption .text { font-size: 16px; }
    .primary-btn { padding: 14px 22px; font-size: 11px; letter-spacing: 0.25em; }
    .footer { gap: 14px; padding: 14px; }
  }

  /* ============================================================
     HOLOGRAM THEME — Phase 1/2 visual upgrade (additive only)
     ============================================================ */

  /* Ambient bokeh / data-light layer behind the grid */
  .bg::before {
    content: "";
    position: absolute; inset: -10%;
    background:
      radial-gradient(circle at 20% 30%, rgba(95,232,255,0.10), transparent 12%),
      radial-gradient(circle at 75% 65%, rgba(95,232,255,0.08), transparent 14%),
      radial-gradient(circle at 50% 80%, rgba(255,159,107,0.06), transparent 16%),
      radial-gradient(circle at 85% 20%, rgba(120,180,255,0.07), transparent 14%),
      radial-gradient(circle at 10% 75%, rgba(95,232,255,0.06), transparent 18%);
    filter: blur(40px);
    animation: bokeh-drift 22s ease-in-out infinite alternate;
    pointer-events: none;
    opacity: 0.9;
  }
  @keyframes bokeh-drift {
    0%   { transform: translate3d(0,0,0) scale(1); }
    50%  { transform: translate3d(-2%, 1%, 0) scale(1.05); }
    100% { transform: translate3d(2%, -1.5%, 0) scale(1.02); }
  }

  /* Drifting data-stream lines */
  .grid::after {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(180deg, transparent 0%, rgba(95,232,255,0.08) 50%, transparent 100%);
    background-size: 100% 200px;
    animation: data-stream 9s linear infinite;
    mix-blend-mode: screen;
    opacity: 0.55;
  }
  @keyframes data-stream {
    0%   { background-position: 0 -200px; }
    100% { background-position: 0 100vh; }
  }

  /* Holographic projection on the avatar */
  .avatar img {
    filter:
      brightness(1.05)
      contrast(1.08)
      saturate(0.85)
      hue-rotate(170deg)
      drop-shadow(0 0 14px rgba(95,232,255,0.45));
    mix-blend-mode: screen;
    animation: holo-flicker 6s ease-in-out infinite;
  }
  @keyframes holo-flicker {
    0%, 100% { opacity: 0.96; }
    42%      { opacity: 0.88; }
    44%      { opacity: 1;    }
    70%      { opacity: 0.92; }
    72%      { opacity: 1;    }
  }

  /* Tinted projection plate beneath the photo */
  .avatar::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 45%, rgba(95,232,255,0.18), transparent 65%),
      linear-gradient(180deg, rgba(10,40,70,0.55), rgba(5,15,30,0.85));
    z-index: 0;
    pointer-events: none;
  }
  .avatar img,
  .avatar .blink,
  .avatar .mouth { position: relative; z-index: 1; }

  /* Scanlines + chromatic sweep over the avatar */
  .avatar::after {
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(95,232,255,0.06) 0px,
        rgba(95,232,255,0.06) 1px,
        transparent 1px,
        transparent 3px
      ),
      linear-gradient(180deg,
        transparent 0%,
        rgba(95,232,255,0.18) 48%,
        rgba(95,232,255,0.28) 50%,
        rgba(95,232,255,0.18) 52%,
        transparent 100%);
    background-size: 100% 100%, 100% 220%;
    background-repeat: repeat, no-repeat;
    background-position: 0 0, 0 -120%;
    animation: scan-sweep 4.2s linear infinite;
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 2;
  }
  @keyframes scan-sweep {
    0%   { background-position: 0 0,    0 -120%; }
    100% { background-position: 0 0,    0  120%; }
  }

  /* Outer ring becomes an "ambient listening" pulse driver */
  .ring.pulse {
    box-shadow:
      0 0 24px rgba(95,232,255,0.35),
      inset 0 0 24px rgba(95,232,255,0.18);
    transition: box-shadow 180ms ease, border-color 180ms ease, transform 180ms ease;
  }
  .ring.pulse.hot {
    border-color: rgba(255,159,107,0.85);
    box-shadow:
      0 0 42px rgba(255,159,107,0.55),
      inset 0 0 28px rgba(255,159,107,0.30);
  }
  .ring.pulse.twin-hot {
    border-color: rgba(95,232,255,0.95);
    box-shadow:
      0 0 48px rgba(95,232,255,0.7),
      inset 0 0 30px rgba(95,232,255,0.35);
  }

  /* Slower, more organic idle sway (additive — augments .breathe) */
  .avatar-wrap {
    animation: idle-sway 7.5s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes idle-sway {
    0%, 100% { transform: translate(0, 0); }
    25%      { transform: translate(-1px, -2px); }
    50%      { transform: translate(1px, -3px); }
    75%      { transform: translate(2px, -1px); }
  }

  /* Mouth gets a softer organic transition */
  .mouth {
    transition: height 80ms ease-out, width 80ms ease-out, border-radius 120ms ease-out;
  }

  @media (prefers-reduced-motion: reduce) {
    .bg::before, .grid::after, .avatar img, .avatar::after,
    .avatar-wrap { animation: none !important; }
  }
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="grid"></div>

<div class="hud">
  <div class="topbar">
    <div class="brand"><span class="dot" id="status-dot"></span>VOYCE // DIGITAL TWIN</div>
    <div class="state-pill" id="state-label">STANDBY</div>
    <div>XTTS · BROWSER · V2.1</div>
  </div>

  <main class="stage">
    <div class="avatar-wrap breathe">
      <div class="ring r3"></div>
      <div class="ring r2"></div>
      <div class="ring pulse"></div>
      <div class="avatar">
        <img src="twin-avatar.jpg" alt="Digital Twin" onerror="this.style.display='none'" />
        <div class="eyes" id="eyes">
          <div class="eye" id="eye-left"><div class="pupil" id="pupil-left"><div class="pupil-dot"></div></div></div>
          <div class="eye" id="eye-right"><div class="pupil" id="pupil-right"><div class="pupil-dot"></div></div></div>
        </div>
        <div class="mouth" id="mouth"></div>
      </div>
    </div>

    <div class="caption" id="caption">
      <span class="who" id="caption-who">TWIN ONLINE</span>
      <span class="text" id="caption-text">Tap "Begin" and just talk to me.</span>
    </div>
  </main>

  <div class="footer">
    <div class="mic-card">
      <div class="mic-ico" id="user-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      </div>
      <div class="level user"><div class="fill" id="user-level"></div></div>
      <div class="mic-lbl">You</div>
    </div>

    <button class="primary-btn" id="convo-btn">⏵ Begin</button>

    <div class="mic-card">
      <div class="mic-ico" id="twin-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        </svg>
      </div>
      <div class="level twin"><div class="fill" id="twin-level"></div></div>
      <div class="mic-lbl">Twin</div>
    </div>
  </div>
</div>

<script>
// ── TABLET IDENTITY — change this for each tablet in your home ──────────────
// Options: "living_room" | "kitchen" | "hallway"
const currentRoom = "living_room";
// ─────────────────────────────────────────────────────────────────────────────

const BACKEND = "https://sentinel-core-mlb4.onrender.com";

const els = {
  bg: document.getElementById('bg'),
  stateLabel: document.getElementById('state-label'),
  statusDot: document.getElementById('status-dot'),
  caption: document.getElementById('caption'),
  captionWho: document.getElementById('caption-who'),
  captionText: document.getElementById('caption-text'),
  mouth: document.getElementById('mouth'),
  eyeLeft: document.getElementById('eye-left'),
  eyeRight: document.getElementById('eye-right'),
  pupilLeft: document.getElementById('pupil-left'),
  pupilRight: document.getElementById('pupil-right'),
  convoBtn: document.getElementById('convo-btn'),
  userIco: document.getElementById('user-ico'),
  twinIco: document.getElementById('twin-ico'),
  userLevel: document.getElementById('user-level'),
  twinLevel: document.getElementById('twin-level'),
};

let convoActive = false;
let recognition = null;
let isProcessing = false; // guard: prevent mic restart while thinking/speaking
let micStream = null;
let audioCtx = null;
let analyserMic = null;
let micRafId = null;
let mouthRafId = null;
let synth = window.speechSynthesis;
let speaking = false;

// --- Camera / Vision ---
const video = document.createElement('video');
const canvas = document.createElement('canvas');
video.setAttribute('playsinline', ''); // iOS compatibility
let cameraStream = null;

async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    video.srcObject = cameraStream;
    await video.play();
  } catch (err) {
    console.warn('Camera not available:', err.message);
  }
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
}

function captureFrame() {
  if (!cameraStream || video.readyState < 2) return null;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.7); // base64 image
}

// Pick best available voice
function getVoice() {
  const voices = synth.getVoices();
  // Prefer a deep male US voice
  const preferred = ['Google US English', 'Alex', 'Daniel', 'en-US'];
  for (const p of preferred) {
    const v = voices.find(v => v.name.includes(p) || v.lang === p);
    if (v) return v;
  }
  return voices.find(v => v.lang.startsWith('en')) || voices[0] || null;
}

function setState(state) {
  const labels = { idle: 'STANDBY', listening: 'LISTENING', thinking: 'PROCESSING', speaking: 'SPEAKING' };
  els.stateLabel.textContent = labels[state] || 'STANDBY';
  els.statusDot.className = 'dot';
  if (state === 'listening') els.statusDot.classList.add('user');
  else if (state === 'thinking') els.statusDot.classList.add('warn');
  else if (state === 'speaking') els.statusDot.classList.add('twin');
  els.userIco.classList.toggle('user-on', state === 'listening');
  els.twinIco.classList.toggle('twin-on', state === 'speaking');
  if (state === 'listening') {
    els.caption.classList.add('user');
    els.captionWho.textContent = 'YOU';
    els.captionText.textContent = 'Listening...';
  } else if (state === 'thinking') {
    els.caption.classList.remove('user');
    els.captionWho.textContent = 'TWIN';
    els.captionText.textContent = 'Thinking...';
  } else if (state === 'speaking') {
    els.caption.classList.remove('user');
    els.captionWho.textContent = 'TWIN';
  } else {
    els.caption.classList.remove('user');
    els.captionWho.textContent = convoActive ? 'TWIN' : 'TWIN ONLINE';
    els.captionText.textContent = convoActive ? 'Standing by.' : 'Tap "Begin" and just talk to me.';
  }
}

// Mouth animation while speaking (simulated)
function startMouthAnim() {
  let t = 0;
  const tick = () => {
    if (!speaking) { stopMouthAnim(); return; }
    const v = 0.3 + 0.7 * Math.abs(Math.sin(t * 0.18));
    els.mouth.style.height = (4 + v * 20) + '%';
    els.mouth.style.width = (22 + v * 8) + '%';
    els.twinLevel.style.width = (v * 100) + '%';
    t++;
    mouthRafId = requestAnimationFrame(tick);
  };
  mouthRafId = requestAnimationFrame(tick);
}
function stopMouthAnim() {
  if (mouthRafId) cancelAnimationFrame(mouthRafId);
  mouthRafId = null;
  els.mouth.style.height = '4%';
  els.mouth.style.width = '22%';
  els.twinLevel.style.width = '0%';
}

// Mic level animation
function startMicLoop() {
  if (!micStream) return;
  const ctx = audioCtx || (audioCtx = new (window.AudioContext || window.webkitAudioContext)());
  const src = ctx.createMediaStreamSource(micStream);
  analyserMic = ctx.createAnalyser();
  analyserMic.fftSize = 512;
  src.connect(analyserMic);
  const data = new Uint8Array(analyserMic.frequencyBinCount);
  let smooth = 0;
  const tick = () => {
    analyserMic.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) { const v = (data[i]-128)/128; sum += v*v; }
    const rms = Math.min(1, Math.sqrt(sum/data.length)*3);
    smooth += (rms - smooth) * 0.4;
    els.userLevel.style.width = (smooth*100) + '%';
    micRafId = requestAnimationFrame(tick);
  };
  micRafId = requestAnimationFrame(tick);
}
function stopMicLoop() {
  if (micRafId) cancelAnimationFrame(micRafId);
  micRafId = null;
  els.userLevel.style.width = '0%';
}

// Eye blink
function blinkEyes(cb) {
  els.eyeLeft.classList.add('closed');
  els.eyeRight.classList.add('closed');
  setTimeout(() => {
    els.eyeLeft.classList.remove('closed');
    els.eyeRight.classList.remove('closed');
    cb && cb();
  }, 100 + Math.random() * 60);
}

function scheduleBlink() {
  const wait = 2000 + Math.random() * 4000;
  setTimeout(() => {
    blinkEyes(() => {
      if (Math.random() < 0.2) {
        setTimeout(() => blinkEyes(scheduleBlink), 150);
      } else {
        scheduleBlink();
      }
    });
  }, wait);
}
scheduleBlink();

// ── Cross-browser face-tracking eye system (BlazeFace via TensorFlow.js) ───
// Works on Chrome, Edge, Safari, Firefox, iPad, Android — any device with a camera
// BlazeFace is a lightweight ML model (~50KB) that runs on-device at 60fps
(function eyeTracking() {
  let cx = 0, cy = 0;          // current smoothed pupil offset (px)
  let tx = 0, ty = 0;          // target pupil offset
  let blazeModel = null;       // BlazeFace model instance
  let trackingActive = false;
  let detecting = false;       // prevent concurrent detect calls
  const DETECT_INTERVAL = 100; // ms between face detection passes
  const MAX_OFFSET = 11;       // max px pupil travels from center

  // ── Smooth animation tick — always running ──────────────────────────────
  function tick() {
    cx += (tx - cx) * 0.07;
    cy += (ty - cy) * 0.07;
    const t = `translate(calc(-50% + ${cx.toFixed(1)}px), calc(-50% + ${cy.toFixed(1)}px))`;
    els.pupilLeft.style.transform = t;
    els.pupilRight.style.transform = t;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ── Face position → pupil offset ────────────────────────────────────────
  // BlazeFace returns predictions with .topLeft and .bottomRight
  function predToOffset(pred, vw, vh) {
    const faceCx = (pred.topLeft[0] + pred.bottomRight[0]) / 2;
    const faceCy = (pred.topLeft[1] + pred.bottomRight[1]) / 2;
    const nx = (faceCx / vw - 0.5) * 2;   // -1..1
    const ny = (faceCy / vh - 0.5) * 2;
    return {
      x: -nx * MAX_OFFSET,        // invert: face goes right → eyes look right
      y:  ny * MAX_OFFSET * 0.55
    };
  }

  // ── Detection loop ───────────────────────────────────────────────────────
  async function detectLoop() {
    if (!trackingActive) return;
    if (detecting || !blazeModel || !cameraStream || video.readyState < 2) {
      setTimeout(detectLoop, DETECT_INTERVAL);
      return;
    }
    detecting = true;
    try {
      const preds = await blazeModel.estimateFaces(video, false);
      if (preds.length > 0) {
        const { x, y } = predToOffset(preds[0], video.videoWidth, video.videoHeight);
        tx = x; ty = y;
      } else {
        // No face — drift gently back toward center
        tx *= 0.88; ty *= 0.88;
      }
    } catch(e) { /* ignore frame errors */ }
    detecting = false;
    setTimeout(detectLoop, DETECT_INTERVAL);
  }

  // ── Idle drift fallback (before model loads or if loading fails) ─────────
  let idleDriftRunning = false;
  function startIdleDrift() {
    if (idleDriftRunning) return;
    idleDriftRunning = true;
    function newTarget() {
      if (trackingActive && blazeModel) return; // model loaded — stop drift
      tx = (Math.random() - 0.5) * MAX_OFFSET * 1.8;
      ty = (Math.random() - 0.5) * MAX_OFFSET * 1.3;
      setTimeout(newTarget, 2000 + Math.random() * 2500);
    }
    newTarget();
  }

  // ── Load BlazeFace model ─────────────────────────────────────────────────
  async function loadModel() {
    try {
      // TF.js + BlazeFace — both from CDN, ~200KB total, runs on any browser
      if (!window.tf) {
        await new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js';
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
      }
      if (!window.blazeface) {
        await new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js';
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
      }
      blazeModel = await window.blazeface.load();
      idleDriftRunning = false; // model ready — real tracking takes over
      if (trackingActive) detectLoop();
    } catch(e) {
      // If CDN blocked or model fails, fall back to idle drift permanently
      startIdleDrift();
    }
  }

  // Start loading model immediately (background, non-blocking)
  startIdleDrift(); // run drift while model loads
  loadModel();

  // ── Hook into camera start/stop ──────────────────────────────────────────
  const _startCamera = startCamera;
  startCamera = async function() {
    await _startCamera();
    trackingActive = true;
    if (blazeModel) detectLoop();
    // if model still loading, detectLoop() will start when camera activates
  };

  const _stopCamera = stopCamera;
  stopCamera = function() {
    trackingActive = false;
    tx = 0; ty = 0; // eyes return to center
    _stopCamera();
  };
})();
// ─────────────────────────────────────────────────────────────────────────────

// While speaking — pupils dilate slightly and drift faster
const _startMouth_eyes = startMouthAnim;
startMouthAnim = function() {
  _startMouth_eyes();
  els.pupilLeft.style.width = els.pupilLeft.style.height = '62%';
  els.pupilRight.style.width = els.pupilRight.style.height = '62%';
};
const _stopMouth_eyes = stopMouthAnim;
stopMouthAnim = function() {
  _stopMouth_eyes();
  els.pupilLeft.style.width = els.pupilLeft.style.height = '52%';
  els.pupilRight.style.width = els.pupilRight.style.height = '52%';
};

// Speech synthesis speak
function speakText(text) {
  return new Promise((resolve) => {
    if (!synth) { resolve(); return; }
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.voice = getVoice();
    utt.rate = 0.92;
    utt.pitch = 0.85;
    utt.volume = 1;
    speaking = true;
    setState('speaking');
    startMouthAnim();
    utt.onend = () => { speaking = false; stopMouthAnim(); resolve(); };
    utt.onerror = () => { speaking = false; stopMouthAnim(); resolve(); };
    synth.speak(utt);
  });
}

function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    els.captionText.textContent = 'Speech not supported. Use Chrome or Edge.';
    return null;
  }
  const rec = new SR();
  rec.lang = 'en-US';
  rec.continuous = true;      // stay open — don't auto-close after one phrase
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  let finalTranscript = '';
  let silenceTimer = null;
  const SILENCE_MS = 1400;    // send after 1.4s of no new speech

  function clearSilence() {
    if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  }
  function armSilence() {
    clearSilence();
    silenceTimer = setTimeout(() => {
      const text = finalTranscript.trim();
      if (text && !isProcessing) {
        finalTranscript = '';
        rec.stop(); // stop cleanly — onend will NOT restart since isProcessing=true
        sendToTwin(text);
      }
    }, SILENCE_MS);
  }

  rec.onstart = () => {
    finalTranscript = '';
    clearSilence();
    setState('listening');
  };

  rec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalTranscript += t + ' ';
        armSilence(); // restart silence countdown each time we get final text
      } else {
        interim += t;
        clearSilence(); // still talking — reset the timer
        armSilence();
      }
    }
    const display = (finalTranscript + interim).trim();
    if (display) els.captionText.textContent = display;
  };

  rec.onerror = (e) => {
    clearSilence();
    if (e.error === 'no-speech') return; // ignore — just silence
    if (e.error === 'aborted') return;   // we aborted intentionally
    els.captionText.textContent = 'Mic error: ' + e.error;
  };

  rec.onend = () => {
    clearSilence();
    // Only restart if convo still active AND we're not already processing
    if (convoActive && !isProcessing) {
      setTimeout(() => {
        try { rec.start(); } catch(_) {}
      }, 200);
    } else if (!convoActive) {
      setState('idle');
    }
  };

  return rec;
}

async function sendToTwin(text) {
  isProcessing = true;
  setState('thinking');

  // Abort any active recognition so it doesn't fight the response
  try { recognition && recognition.abort(); } catch(_) {}

  try {
    const imageData = captureFrame();
    const payload = { message: text, room: currentRoom };
    if (imageData) payload.image = imageData;

    const res = await fetch(`${BACKEND}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    let data = {};
    try { data = await res.json(); } catch(_) {}
    if (!res.ok) throw new Error(data.error || ('Server ' + res.status));

    const reply = (data.response && data.response.trim()) ? data.response.trim() : 'say that again';
    els.captionText.textContent = reply;

    await speakText(reply);

  } catch (err) {
    els.captionText.textContent = 'Error: ' + err.message;
    setState('idle');
  } finally {
    isProcessing = false;
    if (convoActive) {
      // Small pause so the mic doesn't catch the tail of the TTS audio
      setTimeout(startListening, 350);
    } else {
      setState('idle');
    }
  }
}

function startListening() {
  if (!recognition) return;
  try { recognition.start(); } catch(_) {}
}

async function beginConversation() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch {
    els.captionText.textContent = 'Mic permission denied. Use Chrome.';
    return;
  }
  // Unlock audio context
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  // Pre-load voices
  if (synth.getVoices().length === 0) {
    await new Promise(r => { synth.onvoiceschanged = r; setTimeout(r, 1000); });
  }
  recognition = setupRecognition();
  if (!recognition) return;
  convoActive = true;
  startCamera(); // Start eyes when conversation begins
  els.convoBtn.textContent = '◼ End';
  els.convoBtn.classList.add('stop');
  startMicLoop();
  startListening();
}

function endConversation() {
  convoActive = false;
  synth.cancel();
  speaking = false;
  try { recognition && recognition.abort(); } catch(_) {}
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  stopCamera(); // Stop eyes when conversation ends
  stopMicLoop();
  stopMouthAnim();
  els.convoBtn.textContent = '⏵ Begin';
  els.convoBtn.classList.remove('stop');
  setState('idle');
}

els.convoBtn.addEventListener('click', () => {
  if (convoActive) endConversation();
  else beginConversation();
});

setState('idle');

/* ============================================================
   HOLOGRAM ENHANCEMENTS — Phase 2/3 (additive overrides)
   ============================================================ */
(function holoEnhancements() {
  const pulseRing = document.querySelector('.ring.pulse');

  /* --- Organic mouth (phoneme-ish bounce with shape change) --- */
  function startMouthAnimOrganic() {
    let t = 0;
    const tick = () => {
      if (!speaking) { stopMouthAnim(); return; }
      const v = 0.4 + 0.6 * Math.abs(Math.sin(t * 0.25) * Math.cos(t * 0.12));
      const jitter = (Math.random() - 0.5) * 0.08;
      const vv = Math.max(0, Math.min(1, v + jitter));
      els.mouth.style.height = (5 + vv * 15) + '%';
      els.mouth.style.width  = (20 + vv * 10) + '%';
      els.mouth.style.borderRadius = (50 - vv * 22) + '%';
      els.twinLevel.style.width = (vv * 100) + '%';
      if (pulseRing) pulseRing.classList.toggle('twin-hot', vv > 0.55);
      t++;
      mouthRafId = requestAnimationFrame(tick);
    };
    mouthRafId = requestAnimationFrame(tick);
  }
  startMouthAnim = startMouthAnimOrganic;

  const _stopMouth = stopMouthAnim;
  stopMouthAnim = function() {
    _stopMouth();
    els.mouth.style.borderRadius = '50%';
    if (pulseRing) pulseRing.classList.remove('twin-hot');
  };

  /* --- Variable blinking (sometimes double-blink, sometimes long pause) --- */
  // holoEnhancements: blink already handled by scheduleBlink() above — skip duplicate

  /* --- Ambient listening: pulse ring reacts to mic level --- */
  const _startMic = startMicLoop;
  startMicLoop = function() {
    _startMic();
    if (!analyserMic) return;
    const data = new Uint8Array(analyserMic.frequencyBinCount);
    const reactive = () => {
      if (!micRafId) return;
      analyserMic.getByteTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) { const v = (data[i]-128)/128; sum += v*v; }
      const rms = Math.min(1, Math.sqrt(sum/data.length) * 3);
      if (pulseRing) pulseRing.classList.toggle('hot', rms > 0.18);
      requestAnimationFrame(reactive);
    };
    requestAnimationFrame(reactive);
  };

  const _stopMic = stopMicLoop;
  stopMicLoop = function() {
    _stopMic();
    if (pulseRing) pulseRing.classList.remove('hot');
  };
})();
</script>
